name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: project_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET_KEY: ci-test-secret-key-over-32-characters
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: public

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 테스트 실행
        run: ./gradlew test

      - name: 빌드
        run: ./gradlew build -x test

      - name: 테스트 결과 리포트
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: JAR 빌드
        run: ./gradlew clean bootJar -x test

      - name: EC2로 JAR 파일 복사
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app"

      - name: EC2 애플리케이션 재시작
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "=== 환경변수 설정 ==="

            if [ ! -f /home/ubuntu/app/project.env ]; then
              echo "project.env 파일이 없습니다."
              exit 1
            fi

            set -a
            source /home/ubuntu/app/project.env
            set +a

            echo "=== 최신 JAR 확인 ==="

            JAR_FILE=$(ls -t /home/ubuntu/app/build/libs/*.jar | head -n 1)

            if [ -z "$JAR_FILE" ]; then
              echo "JAR 파일이 없습니다."
              exit 1
            fi

            echo "JAR_FILE=$JAR_FILE"

            echo "=== 기존 애플리케이션 종료 ==="

            PID=$(pgrep -f \
              'java -jar /home/ubuntu/app/build/libs/.*\.jar' || true)

            if [ -n "$PID" ]; then
              kill -15 $PID
              sleep 5
            else
              echo "실행 중인 애플리케이션 없음"
            fi

            echo "=== 최신 JAR 실행 ==="

            nohup java -jar "$JAR_FILE" \
              > /home/ubuntu/app/app.log 2>&1 &

            echo "=== 실행 완료 ==="